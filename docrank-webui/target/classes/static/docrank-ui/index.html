<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocRank Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        .fade-in { animation: fadeIn 0.18s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .score-bar {
            height: 3px;
            background: linear-gradient(90deg, #6366f1, #a78bfa);
            border-radius: 9999px;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans" x-data="app()" x-init="init()" x-cloak>

    <!-- ── Header ───────────────────────────────────────────────── -->
    <header class="bg-white border-b border-slate-200 sticky top-0 z-10">
        <div class="max-w-7xl mx-auto px-6 h-14 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414A1 1 0 0119 9.414V19a2 2 0 01-2 2z"/>
                    </svg>
                </div>
                <span class="text-lg font-semibold text-slate-800">DocRank</span>
                <span class="text-xs text-slate-400 font-normal">Admin</span>
            </div>
            <div class="flex items-center gap-4">
                <!-- Health dot -->
                <div class="flex items-center gap-1.5">
                    <span :class="health ? 'bg-emerald-500' : 'bg-red-500'"
                          class="inline-block w-2 h-2 rounded-full"></span>
                    <span class="text-xs text-slate-500" x-text="health ? '服务正常' : '服务异常'"></span>
                </div>
                <!-- Stats pills -->
                <div class="flex items-center gap-2 text-xs">
                    <span class="bg-indigo-50 text-indigo-700 px-2.5 py-1 rounded-full font-medium">
                        向量 <span x-text="stats.vector_chunks ?? '…'"></span>
                    </span>
                    <span class="bg-violet-50 text-violet-700 px-2.5 py-1 rounded-full font-medium">
                        BM25 <span x-text="stats.bm25_chunks ?? '…'"></span>
                    </span>
                </div>
                <button @click="loadStats()" title="刷新状态"
                        class="text-slate-400 hover:text-slate-600 transition-colors text-base leading-none">↻</button>
            </div>
        </div>
    </header>

    <!-- ── Main ──────────────────────────────────────────────────── -->
    <main class="max-w-7xl mx-auto px-6 py-8">

        <!-- Tab bar -->
        <nav class="flex gap-1 mb-8 bg-slate-100 rounded-xl p-1 w-fit">
            <template x-for="tab in tabs" :key="tab.id">
                <button @click="activeTab = tab.id"
                        :class="activeTab === tab.id
                            ? 'bg-white text-slate-800 shadow-sm'
                            : 'text-slate-500 hover:text-slate-700'"
                        class="flex items-center gap-1.5 px-4 py-2 text-sm font-medium rounded-lg transition-all select-none">
                    <span x-text="tab.icon"></span>
                    <span x-text="tab.label"></span>
                </button>
            </template>
        </nav>

        <!-- ══════════════ SEARCH TAB ══════════════ -->
        <div x-show="activeTab === 'search'">
            <div class="bg-white border border-slate-200 rounded-2xl p-6 mb-5 shadow-sm">
                <div class="flex gap-3">
                    <div class="flex-1 relative">
                        <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"
                             fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                        </svg>
                        <input x-model="search.query"
                               @keydown.enter="doSearch()"
                               placeholder="输入搜索查询，支持中 / 日 / 英混合…"
                               class="w-full pl-10 pr-4 py-2.5 border border-slate-300 rounded-xl text-sm
                                      focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent">
                    </div>
                    <select x-model="search.topK"
                            class="border border-slate-300 rounded-xl px-3 py-2.5 text-sm bg-white
                                   focus:outline-none focus:ring-2 focus:ring-indigo-400">
                        <option value="3">Top 3</option>
                        <option value="5" selected>Top 5</option>
                        <option value="10">Top 10</option>
                        <option value="20">Top 20</option>
                    </select>
                    <button @click="doSearch()" :disabled="search.loading"
                            class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2.5 rounded-xl
                                   text-sm font-medium transition-colors disabled:opacity-50 whitespace-nowrap">
                        <span x-show="!search.loading">搜索</span>
                        <span x-show="search.loading">搜索中…</span>
                    </button>
                </div>
                <p x-show="search.error" class="mt-3 text-sm text-red-500" x-text="search.error"></p>
            </div>

            <!-- Results -->
            <div x-show="search.results.length" class="space-y-3">
                <p class="text-xs text-slate-400 mb-3"
                   x-text="`共 ${search.results.length} 条结果`"></p>
                <template x-for="(r, i) in search.results" :key="i">
                    <div class="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm fade-in">
                        <!-- Score bar -->
                        <div class="score-bar mb-3" :style="`width: ${Math.min(r.score * 100, 100)}%`"></div>
                        <div class="flex items-start justify-between mb-2">
                            <div class="flex-1 min-w-0">
                                <p class="font-semibold text-slate-800 truncate"
                                   x-text="r.title || '（无标题）'"></p>
                                <p x-show="r.section" class="text-xs text-slate-400 mt-0.5"
                                   x-text="'§ ' + r.section"></p>
                            </div>
                            <div class="flex items-center gap-2 ml-4 flex-shrink-0">
                                <span class="font-mono text-xs bg-indigo-50 text-indigo-600 px-2 py-0.5 rounded-lg"
                                      x-text="r.score.toFixed(4)"></span>
                                <span class="text-xs bg-slate-100 text-slate-500 px-2 py-0.5 rounded-lg"
                                      x-text="r.language"></span>
                            </div>
                        </div>
                        <p class="text-sm text-slate-600 leading-relaxed line-clamp-4"
                           x-text="r.content"></p>
                        <div class="mt-3 flex flex-wrap items-center gap-2">
                            <code class="text-xs text-slate-400 bg-slate-50 px-2 py-0.5 rounded"
                                  x-text="r.doc_id"></code>
                            <template x-for="tag in r.tags" :key="tag">
                                <span class="text-xs bg-emerald-50 text-emerald-700 px-2 py-0.5 rounded-full"
                                      x-text="tag"></span>
                            </template>
                        </div>
                    </div>
                </template>
            </div>

            <div x-show="search.done && !search.results.length"
                 class="text-center py-20 text-slate-400">
                <div class="text-5xl mb-4">🔍</div>
                <p class="text-sm">没有找到相关结果</p>
            </div>
        </div>

        <!-- ══════════════ INGEST TAB ══════════════ -->
        <div x-show="activeTab === 'ingest'">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">

                <!-- Text ingest -->
                <div class="bg-white border border-slate-200 rounded-2xl p-6 shadow-sm">
                    <h2 class="text-base font-semibold text-slate-800 mb-5">📝 写入文本</h2>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-xs font-medium text-slate-600 mb-1.5">标题</label>
                            <input x-model="ingest.title" placeholder="文档标题（可选）"
                                   class="input-field">
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-slate-600 mb-1.5">
                                标签 <span class="font-normal text-slate-400">（逗号分隔）</span>
                            </label>
                            <input x-model="ingest.tags" placeholder="Java, Spring, 教程"
                                   class="input-field">
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-slate-600 mb-1.5">内容 *</label>
                            <textarea x-model="ingest.content" rows="9"
                                      placeholder="要写入的文本内容…"
                                      class="input-field resize-none"></textarea>
                        </div>
                        <button @click="doIngest()" :disabled="ingest.loading || !ingest.content.trim()"
                                class="btn-primary w-full">
                            <span x-show="!ingest.loading">写入知识库</span>
                            <span x-show="ingest.loading">写入中…</span>
                        </button>
                        <div x-show="ingest.result" class="alert-success" x-text="ingest.result"></div>
                        <div x-show="ingest.error"  class="alert-error"   x-text="ingest.error"></div>
                    </div>
                </div>

                <!-- File upload -->
                <div class="bg-white border border-slate-200 rounded-2xl p-6 shadow-sm">
                    <h2 class="text-base font-semibold text-slate-800 mb-5">📂 上传文件</h2>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-xs font-medium text-slate-600 mb-1.5">标签</label>
                            <input x-model="upload.tags" placeholder="文档, PDF" class="input-field">
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-slate-600 mb-1.5">选择文件</label>
                            <div @dragover.prevent="upload.dragging = true"
                                 @dragleave.prevent="upload.dragging = false"
                                 @drop.prevent="onFileDrop($event)"
                                 @click="$refs.fileInput.click()"
                                 :class="upload.dragging
                                     ? 'border-indigo-400 bg-indigo-50'
                                     : upload.file
                                         ? 'border-emerald-400 bg-emerald-50'
                                         : 'border-slate-300 bg-slate-50 hover:bg-slate-100'"
                                 class="border-2 border-dashed rounded-xl p-10 text-center cursor-pointer
                                        transition-colors select-none">
                                <div class="text-4xl mb-2" x-text="upload.file ? '✅' : '📄'"></div>
                                <p class="text-sm text-slate-600 font-medium"
                                   x-text="upload.file ? upload.file.name : '点击或拖拽文件到此处'"></p>
                                <p class="text-xs text-slate-400 mt-1">
                                    PDF · MD · HTML · DOCX · TXT · JSON
                                </p>
                                <input type="file" x-ref="fileInput" @change="onFileSelect($event)"
                                       class="hidden"
                                       accept=".pdf,.md,.html,.docx,.txt,.json">
                            </div>
                        </div>
                        <button x-show="upload.file"
                                @click="upload.file = null; $refs.fileInput.value = ''"
                                class="text-xs text-slate-400 hover:text-red-500 transition-colors">
                            × 取消选择
                        </button>
                        <button @click="doUpload()" :disabled="upload.loading || !upload.file"
                                class="btn-primary w-full">
                            <span x-show="!upload.loading">上传并写入</span>
                            <span x-show="upload.loading">上传中…</span>
                        </button>
                        <div x-show="upload.result" class="alert-success" x-text="upload.result"></div>
                        <div x-show="upload.error"  class="alert-error"   x-text="upload.error"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- ══════════════ MANAGE TAB ══════════════ -->
        <div x-show="activeTab === 'manage'">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">

                <!-- Delete by doc_id -->
                <div class="bg-white border border-slate-200 rounded-2xl p-6 shadow-sm">
                    <h2 class="text-base font-semibold text-slate-800 mb-1">🗑 删除文档</h2>
                    <p class="text-xs text-slate-400 mb-5">按 doc_id 精确删除单个文档及其所有 chunks</p>
                    <div class="space-y-4">
                        <input x-model="del.docId" placeholder="输入 doc_id…"
                               class="input-field">
                        <button @click="doDelete()" :disabled="del.loading || !del.docId.trim()"
                                class="w-full py-2.5 rounded-xl text-sm font-medium transition-colors
                                       bg-red-600 hover:bg-red-700 text-white disabled:opacity-50">
                            <span x-show="!del.loading">删除文档</span>
                            <span x-show="del.loading">删除中…</span>
                        </button>
                        <div x-show="del.result" class="alert-success" x-text="del.result"></div>
                        <div x-show="del.error"  class="alert-error"   x-text="del.error"></div>
                    </div>
                </div>

            </div>
        </div>

        <!-- ══════════════ STATS TAB ══════════════ -->
        <div x-show="activeTab === 'stats'">
            <!-- Stat cards -->
            <div class="grid grid-cols-3 gap-4 mb-6">
                <div class="bg-white border border-slate-200 rounded-2xl p-6 shadow-sm">
                    <p class="text-xs text-slate-400 mb-3">服务状态</p>
                    <div class="flex items-center gap-2">
                        <span :class="health ? 'bg-emerald-500' : 'bg-red-500'"
                              class="w-3 h-3 rounded-full flex-shrink-0"></span>
                        <span class="text-xl font-bold"
                              :class="health ? 'text-emerald-600' : 'text-red-600'"
                              x-text="health ? '正常' : '异常'"></span>
                    </div>
                </div>
                <div class="bg-white border border-slate-200 rounded-2xl p-6 shadow-sm">
                    <p class="text-xs text-slate-400 mb-3">向量索引 chunks</p>
                    <p class="text-3xl font-bold text-indigo-600" x-text="stats.vector_chunks ?? '—'"></p>
                    <p class="text-xs text-slate-400 mt-1">LanceDB / Qdrant / Memory</p>
                </div>
                <div class="bg-white border border-slate-200 rounded-2xl p-6 shadow-sm">
                    <p class="text-xs text-slate-400 mb-3">BM25 全文索引 chunks</p>
                    <p class="text-3xl font-bold text-violet-600" x-text="stats.bm25_chunks ?? '—'"></p>
                    <p class="text-xs text-slate-400 mt-1">Lucene 9.x</p>
                </div>
            </div>

            <!-- System info table -->
            <div class="bg-white border border-slate-200 rounded-2xl p-6 shadow-sm">
                <h2 class="text-base font-semibold text-slate-800 mb-5">系统信息</h2>
                <div class="divide-y divide-slate-100 text-sm">
                    <template x-for="row in sysInfo" :key="row.k">
                        <div class="flex justify-between py-3">
                            <span class="text-slate-500" x-text="row.k"></span>
                            <template x-if="row.link">
                                <a :href="row.v" target="_blank"
                                   class="text-indigo-600 hover:underline" x-text="row.v + ' ↗'"></a>
                            </template>
                            <template x-if="!row.link">
                                <span class="font-medium text-slate-800" x-text="row.v"></span>
                            </template>
                        </div>
                    </template>
                </div>
            </div>
        </div>

    </main>

    <!-- ── Alpine app ─────────────────────────────────────────────── -->
    <script>
    function app() {
        return {
            activeTab: 'search',
            tabs: [
                { id: 'search', icon: '🔍', label: '搜索' },
                { id: 'ingest', icon: '📥', label: '写入' },
                { id: 'manage', icon: '🗑', label: '管理' },
                { id: 'stats',  icon: '📊', label: '统计' },
            ],
            health: false,
            stats:  {},
            sysInfo: [
                { k: '框架版本',     v: 'DocRank 1.0.0' },
                { k: 'Embedding',   v: 'BGE-M3 (ONNX, dim=1024)' },
                { k: 'Reranker',    v: 'bge-reranker-v2-m3 (ONNX)' },
                { k: '检索策略',     v: 'BM25 ‖ 向量  →  RRF(k=60)  →  Rerank  →  AdvancedScorer' },
                { k: '语言支持',     v: 'Chinese · Japanese · English (auto-detect)' },
                { k: 'MCP API',     v: '/mcp/tools', link: true },
                { k: 'OpenAPI',     v: '/swagger-ui.html', link: true },
            ],

            search:   { query:'', topK:'5', results:[], loading:false, error:'', done:false },
            ingest:   { title:'', content:'', tags:'', loading:false, result:'', error:'' },
            upload:   { file:null, tags:'', loading:false, result:'', error:'', dragging:false },
            del:      { docId:'', loading:false, result:'', error:'' },

            async init() { await this.loadStats(); },

            async loadStats() {
                try {
                    const r    = await fetch('/mcp/kb_stats');
                    const data = await r.json();
                    if (data.success) { this.stats = data.data; this.health = !!data.data.healthy; }
                } catch { this.health = false; }
            },

            async doSearch() {
                if (!this.search.query.trim()) return;
                this.search.loading = true; this.search.error = ''; this.search.results = []; this.search.done = false;
                try {
                    const body = { query: this.search.query, top_k: +this.search.topK };
                    const r    = await fetch('/mcp/kb_search', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
                    const data = await r.json();
                    if (data.success) this.search.results = data.data.results;
                    else this.search.error = data.error || '搜索失败';
                } catch(e) { this.search.error = '网络错误: ' + e.message; }
                finally    { this.search.loading = false; this.search.done = true; }
            },

            async doIngest() {
                if (!this.ingest.content.trim()) return;
                this.ingest.loading = true; this.ingest.result = ''; this.ingest.error = '';
                try {
                    const tags = this.ingest.tags ? this.ingest.tags.split(',').map(t=>t.trim()).filter(Boolean) : [];
                    const body = {
                        content:    this.ingest.content,
                        title:      this.ingest.title,
                        tags
                    };
                    const r    = await fetch('/mcp/kb_ingest', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
                    const data = await r.json();
                    if (data.success) {
                        this.ingest.result = `✅ 写入成功  doc_id: ${data.data.doc_id}  |  ${data.data.chunk_count} chunks`;
                        this.ingest.content = ''; this.ingest.title = '';
                        await this.loadStats();
                    } else this.ingest.error = data.error || '写入失败';
                } catch(e) { this.ingest.error = '网络错误: ' + e.message; }
                finally    { this.ingest.loading = false; }
            },

            onFileSelect(e) { this.upload.file = e.target.files[0] || null; },
            onFileDrop(e)   { this.upload.file = e.dataTransfer.files[0] || null; this.upload.dragging = false; },

            async doUpload() {
                if (!this.upload.file) return;
                this.upload.loading = true; this.upload.result = ''; this.upload.error = '';
                try {
                    const fd = new FormData();
                    fd.append('file', this.upload.file);
                    this.upload.tags.split(',').map(t=>t.trim()).filter(Boolean).forEach(t=>fd.append('tags',t));
                    const r    = await fetch('/mcp/kb_ingest_file', { method:'POST', body:fd });
                    const data = await r.json();
                    if (data.success) {
                        this.upload.result = `✅ 上传成功  doc_id: ${data.data.doc_id}  |  ${data.data.chunk_count} chunks`;
                        this.upload.file = null;
                        await this.loadStats();
                    } else this.upload.error = data.error || '上传失败';
                } catch(e) { this.upload.error = '网络错误: ' + e.message; }
                finally    { this.upload.loading = false; }
            },

            async doDelete() {
                if (!this.del.docId.trim()) return;
                this.del.loading = true; this.del.result = ''; this.del.error = '';
                try {
                    const r    = await fetch('/mcp/kb_delete', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({doc_id:this.del.docId}) });
                    const data = await r.json();
                    if (data.success) { this.del.result = `✅ 已删除: ${this.del.docId}`; this.del.docId = ''; await this.loadStats(); }
                    else this.del.error = data.error || '删除失败';
                } catch(e) { this.del.error = '网络错误: ' + e.message; }
                finally    { this.del.loading = false; }
            },
        }
    }
    </script>

    <!-- Shared utility classes via Tailwind @apply equivalent (inline style) -->
    <style>
        .input-field {
            @apply w-full border border-slate-300 rounded-xl px-4 py-2.5 text-sm
                   focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent;
        }
        .btn-primary {
            @apply py-2.5 rounded-xl text-sm font-medium transition-colors
                   bg-indigo-600 hover:bg-indigo-700 text-white disabled:opacity-50;
        }
        .alert-success {
            @apply p-3 bg-emerald-50 border border-emerald-200 rounded-xl text-sm text-emerald-800;
        }
        .alert-error {
            @apply p-3 bg-red-50 border border-red-200 rounded-xl text-sm text-red-700;
        }
    </style>
</body>
</html>
