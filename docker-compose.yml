services:
  docrank:
    image: memo/docrank:latest
    build: .
    container_name: docrank
    ports:
      - "8080:8080"
    environment:
      # ── 向量后端：InMemory（无需 LanceDB，重启后清空）
      DOCRANK_BACKEND_TYPE: memory

      # ── Embedding：随机向量（无需 ONNX 模型文件）
      DOCRANK_EMBEDDING_TYPE: random
      DOCRANK_EMBEDDING_DIMENSION: "256"

      # ── Reranker：禁用
      DOCRANK_RERANKER_ENABLED: "false"

      # ── Lucene BM25（容器内临时目录）
      DOCRANK_LUCENE_INDEX_PATH: /tmp/docrank/lucene-index

      # ── AI Agent
      DOCRANK_AGENT_ENABLED: "true"
      DOCRANK_AGENT_LLM_PROVIDER: claude
      DOCRANK_AGENT_LLM_MODEL: claude-sonnet-4-6
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # OPENAI_API_KEY: ${OPENAI_API_KEY:-}

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/mcp/kb_stats || exit 1"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 3
